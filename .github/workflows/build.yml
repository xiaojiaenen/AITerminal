name: 构建多平台可执行文件

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runs-on: ubuntu-latest
          - name: macos-x64
            runs-on: macos-13
          - name: macos-arm64
            runs-on: macos-latest
          - name: windows-x64
            runs-on: windows-latest

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装 PyInstaller
        run: python -m pip install pyinstaller

      - name: 安装项目依赖
        run: python -m pip install .

      - name: 构建
        run: python build.py

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: ai-terminal-${{ matrix.name }}
          path: dist/ai-terminal*
