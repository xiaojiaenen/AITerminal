name: Build & Release

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check ai_terminal/ tests/ 2>&1 || true

      - name: Test
        run: pytest -v --tb=short 2>&1 || true

  build:
    needs: test
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            suffix: ""
          - name: macos-x64
            os: macos-13
            suffix: ""
          - name: macos-arm64
            os: macos-latest
            suffix: ""
          - name: windows-x64
            os: windows-latest
            suffix: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: python -m pip install pyinstaller

      - name: Install dependencies
        run: python -m pip install .

      - name: Build
        run: python build.py

      - name: Rename artifact
        shell: bash
        run: |
          if [ -f "dist/ai-terminal${{ matrix.suffix }}" ]; then
            cp "dist/ai-terminal${{ matrix.suffix }}" "dist/ai-terminal-${{ matrix.name }}${{ matrix.suffix }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-terminal-${{ matrix.name }}
          path: dist/ai-terminal-${{ matrix.name }}${{ matrix.suffix }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: ai-terminal-*
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
